apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: sirius
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-minio
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z minio 9000; do echo waiting for minio; sleep 2; done"]
      containers:
        - name: api-service
          image: api-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: db-secret
            - secretRef:
                name: s3-secret
          env:
            # S3_EXTERNAL_URL удалена — API будет возвращать оригинальный хост minio:9000
            - name: JWKS_URL
              value: "https://id.klsh.ru/realms/sirius/protocol/openid-connect/certs"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"