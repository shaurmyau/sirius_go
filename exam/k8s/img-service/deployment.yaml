apiVersion: apps/v1
kind: Deployment
metadata:
  name: img-service
  namespace: sirius
spec:
  replicas: 1
  selector:
    matchLabels:
      app: img-service
  template:
    metadata:
      labels:
        app: img-service
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-minio
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z minio 9000; do echo waiting for minio; sleep 2; done"]
      containers:
        - name: img-service
          image: img-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: db-secret
            - secretRef:
                name: s3-secret
          env:
            - name: PUSH_ENDPOINT
              value: "http://push-service:8082/notify"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
