apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: sirius
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_DOMAIN
              value: "localhost,minio"
            - name: MINIO_NOTIFY_WEBHOOK_ENABLE_1
              value: "on"
            - name: MINIO_NOTIFY_WEBHOOK_ENDPOINT_1
              value: "http://img-service:8081/img/process"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-pvc
